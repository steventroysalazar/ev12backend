server:
  port: 8090

spring:
 datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:smsbackend;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
        driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
        username: ${SPRING_DATASOURCE_USERNAME:sa}
        password: ${SPRING_DATASOURCE_PASSWORD:}

 jpa:
        hibernate:
            ddl-auto: update
        open-in-view: false

 h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console

gateway:
  base-url: http://192.168.1.37:8082
  token: "00f30633-4029-4cb7-b088-1f84e7251a53"
  default-limit: 100

webhook:
  ev12-token: ${WEBHOOK_EV12_TOKEN:}
  ev12-persist-events: ${WEBHOOK_EV12_PERSIST_EVENTS:false}
  ev12-in-memory-events-max: ${WEBHOOK_EV12_IN_MEMORY_EVENTS_MAX:1000}
